app = "aion2-guild-bot"
primary_region = "nrt"

[build]

[mounts]
  source = "aion2_data"
  destination = "/app/data"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[[services]]
  internal_port = 8000
  protocol = "tcp"

  [[services.tcp_checks]]
    grace_period = "30s"
    interval = "15s"
    restart_limit = 0
    timeout = "10s"
